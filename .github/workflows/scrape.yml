name: Daily Healthcare News Scraper

on:
  schedule:
    # 2:15 AM UTC is 7:45 AM IST (staggered to run reliably and avoid peak hour delays)
    - cron: '15 2 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

# OPTIMIZATION 1: Prevent concurrent runs from stepping on each other
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false 

jobs:
  scrape-and-upload:
    runs-on: ubuntu-latest
    
    # OPTIMIZATION 2: Fail-fast timeout to prevent hanging scrapers from burning minutes
    timeout-minutes: 30 
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      # OPTIMIZATION 3: Cache NLTK downloads to speed up the setup phase
      - name: Cache NLTK Data
        uses: actions/cache@v4
        id: cache-nltk
        with:
          path: ~/nltk_data
          key: ${{ runner.os }}-nltk-punkt

      # OPTIMIZATION 4: Removed `apt-get install` block (See notes below)

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Download NLTK Data (if not cached)
        # NLTK will automatically skip the download if the cache restored the files
        run: python -m nltk.downloader punkt

      - name: Run Scraper
        env:
          FIREBASE_SERVICE_ACCOUNT_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python scraper.py

      - name: Keep workflow active
        uses: gautamkrishnar/keepalive-workflow@v2