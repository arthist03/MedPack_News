name: Daily Healthcare News Scraper

on:
  schedule:
    # 2:15 AM UTC is 7:45 AM IST (staggered to run reliably and avoid peak hour delays)
    - cron: '15 2 * * *'
  workflow_dispatch: {} # Allows manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  scrape-and-upload:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-dev libxml2-dev libxslt1-dev libjpeg-dev zlib1g-dev libpng-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m nltk.downloader punkt

      - name: Run Scraper
        env:
          FIREBASE_SERVICE_ACCOUNT_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python scraper.py

      - name: Keep workflow active
        uses: gautamkrishnar/keepalive-workflow@v2
